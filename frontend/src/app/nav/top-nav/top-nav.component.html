  <a (click)="scrollTo('experience')">Experience</a>
  <a (click)="scrollTo('education')">Education</a>

<!--  -->

<nav class="mob">
  <div class="hambtn">
    <i
      class="fa fa-bars"
      *ngIf="!flag.navopen"
      (click)="$event.stopPropagation(); flag.navopen = true"
    ></i>
    <i
      class="fa fa-close"
      *ngIf="flag.navopen"
      (click)="$event.stopPropagation(); flag.navopen = false"
    ></i>
  </div>
  <div class="p-2 shownav" *ngIf="flag.navopen">
    <a (click)="scrollTo('home'); flag.navopen = false">Home</a>
    <a (click)="scrollTo('experience'); flag.navopen = false">Experience</a>
    <a (click)="scrollTo('education'); flag.navopen = false">Education</a>
    <a (click)="scrollTo('project'); flag.navopen = false">Projects</a>
    <a (click)="scrollTo('contact'); flag.navopen = false">Contact Me</a>
  </div>
</nav>
