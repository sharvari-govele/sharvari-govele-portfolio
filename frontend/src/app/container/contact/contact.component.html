<div class="contact-container container py-4">
  <h1 class="font-style">Get in Touch</h1>
  <form class="contact-form" [formGroup]="contactForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label class="font-style2" for="name">Full Name</label>
      <input id="name" formControlName="name" placeholder="Enter your name" [class.error]="
          contactForm.get('name')?.invalid && contactForm.get('name')?.touched
        " />
      <small *ngIf="
          contactForm.get('name')?.invalid && contactForm.get('name')?.touched
        ">Name is required.</small>
    </div>

    <div class="form-group">
      <label class="font-style2" for="email">Email Address</label>
      <input id="email" type="email" formControlName="email" placeholder="email@example.com" [class.error]="
          contactForm.get('email')?.invalid && contactForm.get('email')?.touched
        " />
      <small *ngIf="
          contactForm.get('email')?.invalid && contactForm.get('email')?.touched
        ">Enter a valid email.</small>
    </div>

    <div class="form-group">
      <label class="font-style2" for="message">Message</label>
      <textarea id="message" formControlName="message" rows="4" placeholder="How can I help?"></textarea>
    </div>

    @if (isSentFailed) {
    <button type="submit" class="mybtn">Failed to sent message</button>
    } @else if (isSent) {
    <button type="submit" class="mybtn">Message sent successfully</button>
    } @else {
    <button type="submit" [disabled]="contactForm.invalid" class="mybtn">
      @if (!loading) {
      <span>Send Message</span>
      } @else {
      <div class="spinner"></div>
      }
    </button>
    }
  </form>
</div>
