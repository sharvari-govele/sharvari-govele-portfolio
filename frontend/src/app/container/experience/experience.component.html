<div class="experience-container container py-5">
  <div class="main-timeline">
    <div class="timeline-item mb-5" *ngFor="let exp of experiences">
      <div class="row">
        <div class="col-md-3 text-md-end  timeline-date">
          <h6 class="font-style4">{{ exp.duration }}</h6>
        </div>
        <div class="col-md-9 ps-md-4 position-relative">
          <div class="timeline-dot"></div>
          <h4 class="font-style1 mb-1">{{ exp.role }}</h4>
          <h5 class="font-style2 mb-2">{{ exp.company }} <small *ngIf="exp.project">| {{ exp.project }}</small></h5>
          
          <ul class="font-style3">
            <li *ngFor="let line of exp.description">{{ line }}</li>
          </ul>

          <div class="mt-3">
            <span class="badge rounded-pill bg-light text-dark border me-2" *ngFor="let skill of exp.tech">
              {{ skill }}
            </span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
