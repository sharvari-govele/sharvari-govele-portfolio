<div class="project-container container py-4">
  <h1 class="font-style">Project</h1>
  <div class="row g-4 justify-content-center">
    @for (item of projects; track item.name; let i = $index) {
      <div class="col-12 col-sm-6 col-md-4">
        <div class="project-card" (click)="toggleFlip(i)">
          
          <div class="project-card-inner shadow-sm" 
               [class.is-flipped]="flippedIndex === i">
            
            <div class="card-side card-front d-flex flex-column align-items-center justify-content-center p-3">
              <div class="mb-2">{{ item.icon }}</div>
              <h5 class="fw-bold">{{ item.name }}</h5>
              <p class="text-muted small d-md-none mt-2">Tap for details</p>
              <p class="text-muted small d-none d-md-block mt-2">Hover for details</p>
            </div>

            <div class="card-side card-back d-flex flex-column align-items-center justify-content-center p-3 text-center bg-primary text-white">
              <h6 class="fw-bold mb-2">{{ item.name }}</h6>
              <p class="small mb-3">{{ item.details }}</p>
              <button class="btn btn-sm btn-outline-light rounded-pill px-3" 
                      (click)="$event.stopPropagation(); openProject(item.url)">
                Visit Site
              </button>
            </div>

          </div>
        </div>
      </div>
    }
  </div>
</div>
